{% extends "base.html" %}
{% block title %}<title>Create Reels</title>{% endblock %}

{% block styles %}
<style>
    .file-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 10px;
    }

    .file-row button {
        background-color: white;
        border: 1px solid #8367C7;
        padding: 5px 10px;
        cursor: pointer;
    }

    .file-row button:hover {
        background-color: #ff1a1a;
        color: white;
    }

    form {
        width: 60vw;
        background-color: #DFBBB1;
        border: #4505e8 solid 1px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 50px auto;
        padding: 20px;
        border-radius: 12px;
    }

    .addfile {
        background-color: #11d057;
        color: #F0FFF1;
        border: none;
        padding: 10px 20px;
        font-size: 18px;
        cursor: pointer;
        margin-top: 15px;
    }

    .createreel {
        margin-top: 15px;
        padding: 10px;
        width: 40%;
        border-radius: 5px;
        border: none;
        background-color: #11d057;
        color: white;
        font-size: larger;
    }
    .form-title{
        font-size: 2rem;
        color: #8367C7;
        background-color: #B3E9C7;
        padding: 10px;
        border-radius: 5px;
        border: 2px solid #8367C7;
        margin-bottom: 4rem;
    }
</style>
{% endblock %}

{% block content %}

<form method="POST" enctype="multipart/form-data">
    <h2 class="form-title">Create Your Reel</h2>

    <div id="file-container">
        <div class="file-row">
            <input type="file" name="files[0]">
            <input type="hidden" name="uuid" value="{{ myid }}">
            <button type="button" onclick="removeFile(this)">❌</button>
        </div>
    </div>

    <button type="button" class="addfile" onclick="addFile()">➕ Add File</button>
    
    <textarea type="text" name="text" placeholder="Enter text for the reel..."
        style="margin-top: 15px; padding: 10px; height: 100px; width: 80%; border-radius: 5px; border: 1px solid #ccc;"></textarea>

    <button type="submit" class="createreel">Create Reel</button>
</form>

<script>
let fileIndex = 1;

function addFile() {
    const container = document.getElementById("file-container");

    const div = document.createElement("div");
    div.className = "file-row";

    div.innerHTML = `
        <input type="file" name="files[${fileIndex}]">
        <button type="button" onclick="removeFile(this)">❌</button>
        <input type="hidden" name="uuid" value="{{ myid }}">
    `;

    container.appendChild(div);
    fileIndex++;
}

function removeFile(button) {
    const container = document.getElementById("file-container");

    if (container.children.length > 1) {
        button.parentElement.remove();
    } else {
        alert("At least one file input is required!");
    }
}
</script>

{% endblock %}
