{% extends "base.html" %}

{% block title %}<title>Home</title>{% endblock %}

{% block styles %}
    <style>
        .welcome {
            text-align: center;
            margin-top: 50px;
        }
        .welcome h2 {
            font-size: 36px;
            color: #333;
        }
        .welcome p {
            font-size: 18px;
            color: #666;
        }
        navbar{
            background-color: #8367C7;
            color:antiquewhite;
            padding: 15px;
            margin:0px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height:30px;
            text-align: center;
        }

        h1{
            margin: 0;
            font-size: 24px;
        }
        h1:hover{
            color:rgb(154, 217, 230);
            cursor: pointer;
        }
        a{
            color:antiquewhite;
            text-decoration: none;
            margin-left: 20px;
            font-size: 18px;
        }
        footer{
            background-color: #8367C7;
            color:antiquewhite;
            padding: 10px;
            margin-top: 20px;
            bottom: 0px;
            position: relative;
            width: 100%;
        }
        content{
            background-color: #11d057;
            margin-top: 30px;
            margin-bottom: 50px;
        }
        button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            font-size: 18px;
            color: #F0FFF1;
            background-color: #11d057;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #e0b457;
        }
        h2{
            font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            color: #333;
        }
        .welcome {
            font-family: 'Arial', sans-serif;
            background-color: #B3E9C7;
            height: 265px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: auto;
            margin: 50px auto;
            width: 100%;
            border-radius: 5%;
        }
        .photos {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
            
        }
        img {
            width: 150px;
            height: 270px;   
            object-fit: cover;
            border-radius: 10px;
        }
        img:hover {
            transform: scale(1.05);
            transition: transform 0.3s ease;
        }
        .h1{
            font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            color: #9026e1;
            font-size: 50px;
            display: block;
            border-color: #333;
            border-width: 2px;
            border-style: solid;
        }
        .h1:hover{
            color:rgb(255, 167, 14);
            cursor: pointer;
        }
    </style>
{% endblock %}

{% block content %}
    <div class="welcome">
        <h2>Welcome to <h1 class="h1">VidSnapAI</h1></h2>
        <p>Your one-stop solution for creating stunning video reels with AI-powered tools.</p>
    </div>
    <button onclick="window.location.href='/create'">Get Started</button>
    <div class="photos">
        <img src="{{ url_for('static', filename='1.jpg') }}" alt="Photo 1" >
        <img src="{{ url_for('static', filename='2.jpg') }}" alt="Photo 2" >
        <img src="{{ url_for('static', filename='3.jpg') }}" alt="Photo 3" >
        <img src="{{ url_for('static', filename='4.jpg') }}" alt="Photo 4" >
        <img src="{{ url_for('static', filename='5.jpg') }}" alt="Photo 5" >
    </div> 
{% endblock %}
